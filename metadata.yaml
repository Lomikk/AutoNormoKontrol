abstract: >-
  Объектом исследования является процесс подготовки курсовой работы, предметом —
  программное представление требований к её структуре и оформлению. Цель работы —
  разработать воспроизводимый шаблон по СТО ЮУрГУ 21–2008. Методика основана на
  разделении семантического Markdown, проверяемого набора правил и LaTeX-профиля.
  Получен прототип, автоматически проверяющий структуру, ссылки, нумерацию и
  параметры страницы. Результат применим при подготовке учебных документов после
  подтверждения требований кафедрой; его значимость состоит в снижении числа
  ручных ошибок нормоконтроля. Сделан вывод о необходимости отдельных проверок
  семантических и внешне подтверждаемых требований.

