title: "Архитектура защиты LLM-сервисов от атак Prompt Injection"
author: "Яшков Андрей Михайлович"
organization: "ФГАОУ ВО «Южно-Уральский государственный университет (НИУ)», Высшая школа экономики и управления, кафедра цифровой экономики и информационных технологий"
abstract: >-
  Рассмотрена архитектура защиты сервисов на основе больших языковых моделей от
  атак Prompt Injection. На основе публикаций о применении LLM, эксплойтах и
  LLM Security Proxy выделены четыре уровня защиты: разделение доверия к данным,
  минимизация полномочий, проверка действий прокси и журналирование. Показано,
  что безопасность должна обеспечиваться на уровне всего сервиса, а не только
  фильтрацией текста запроса.
keywords:
  - большие языковые модели
  - Prompt Injection
  - кибербезопасность
  - защитный прокси
